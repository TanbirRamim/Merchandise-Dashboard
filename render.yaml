services:
  - type: web
    name: merchandise-dashboard-backend
    env: ruby
    buildCommand: cd backend && bundle install
    startCommand: cd backend && bundle exec rails server -p $PORT
    envVars:
      - key: RAILS_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: merchandise-dashboard-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://merchandise-dashboard-frontend.onrender.com
      - key: RACK_ENV
        value: production

  - type: web
    name: merchandise-dashboard-frontend
    env: node
    buildCommand: cd client && npm install && npm run build
    startCommand: cd client && npm start
    envVars:
      - key: REACT_APP_API_URL
        value: https://merchandise-dashboard-backend.onrender.com
      - key: NODE_ENV
        value: production
    staticPublishPath: client/build

databases:
  - name: merchandise-dashboard-db
    databaseName: merchandise_dashboard
    user: merchandise_dashboard
    plan: free 